<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korale</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f12; color: #eeeae4; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 16px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); }
    h1 { font-size: 20px; font-weight: 600; color: #b0a4f9; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { display: flex; gap: 10px; }
    .msg.user { flex-direction: row-reverse; }
    .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
    .msg.ai .bubble { background: #17171c; border: 1px solid rgba(255,255,255,0.08); }
    .msg.user .bubble { background: #8b7cf6; color: white; }
    .av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .av.ai { background: #8b7cf6; color: white; }
    .av.user { background: #1f1f26; color: #888; }
    footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 10px; }
    input { flex: 1; background: #17171c; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px; color: #eeeae4; font-size: 14px; outline: none; }
    input:focus { border-color: #8b7cf6; }
    button { background: #8b7cf6; border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; }
    button:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <header><h1>Korale</h1></header>
  <div id="messages">
    <div class="msg ai">
      <div class="av ai">K</div>
      <div class="bubble">Bonjour, je suis Korale. Comment puis-je vous aider aujourd'hui ?</div>
    </div>
  </div>
  <footer>
    <input id="inp" type="text" placeholder="Écrivez votre message…" onkeydown="if(event.key==='Enter') send()" />
    <button onclick="send()">Envoyer</button>
  </footer>
  <script>
    let history = [];

    async function send() {
      const inp = document.getElementById('inp');
      const text = inp.value.trim();
      if (!text) return;
      inp.value = '';

      addMsg('user', text);
      history.push({ role: 'user', content: text });

      const aiDiv = addMsg('ai', '...');

      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            const data = JSON.parse(line.slice(6));
            if (data.text) { full += data.text; aiDiv.textContent = full; }
          }
        }
      }
      history.push({ role: 'assistant', content: full });
      scrollToBottom();
    }

    function addMsg(role, text) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      const av = role === 'ai' ? 'K' : 'V';
      div.innerHTML = `<div class="av ${role}">${av}</div><div class="bubble">${text}</div>`;
      msgs.appendChild(div);
      scrollToBottom();
      return div.querySelector('.bubble');
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }
  </script>
</body>
</html>

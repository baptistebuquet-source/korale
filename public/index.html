<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Korale</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f0f12; color: #eeeae4; font-family: system-ui, sans-serif; height: 100vh; display: flex; flex-direction: column; }

    /* AUTH */
    #auth-screen { flex: 1; display: flex; align-items: center; justify-content: center; }
    .auth-box { background: #17171c; border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 40px; width: 360px; }
    .auth-logo { font-size: 28px; font-weight: 700; color: #b0a4f9; margin-bottom: 8px; }
    .auth-sub { font-size: 13px; color: rgba(238,234,228,0.45); margin-bottom: 28px; }
    .auth-tabs { display: flex; gap: 0; margin-bottom: 24px; background: #0f0f12; border-radius: 8px; padding: 3px; }
    .auth-tab { flex: 1; padding: 8px; text-align: center; font-size: 13px; cursor: pointer; border-radius: 6px; color: rgba(238,234,228,0.45); transition: all 0.2s; }
    .auth-tab.active { background: #8b7cf6; color: white; }
    .auth-input { width: 100%; background: #0f0f12; border: 1px solid rgba(255,255,255,0.1); border-radius: 8px; padding: 10px 14px; color: #eeeae4; font-size: 13px; margin-bottom: 10px; outline: none; }
    .auth-input:focus { border-color: #8b7cf6; }
    .auth-btn { width: 100%; background: #8b7cf6; border: none; color: white; padding: 11px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 6px; transition: opacity 0.2s; }
    .auth-btn:hover { opacity: 0.85; }
    .auth-error { font-size: 12px; color: #f06a6a; margin-top: 8px; }

    /* CHAT */
    #chat-screen { flex: 1; display: none; flex-direction: column; }
    header { padding: 14px 24px; border-bottom: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 12px; }
    .logo { font-size: 20px; font-weight: 700; color: #b0a4f9; }
    .user-info { margin-left: auto; font-size: 12px; color: rgba(238,234,228,0.45); }
    .logout-btn { background: none; border: 1px solid rgba(255,255,255,0.1); color: rgba(238,234,228,0.45); padding: 4px 10px; border-radius: 6px; font-size: 11px; cursor: pointer; margin-left: 10px; }
    .logout-btn:hover { border-color: #8b7cf6; color: #b0a4f9; }
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
    .msg { display: flex; gap: 10px; animation: up 0.3s ease; }
    .msg.user { flex-direction: row-reverse; }
    @keyframes up { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .av { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .av.ai { background: #8b7cf6; color: white; }
    .av.user { background: #1f1f26; color: #888; }
    .bubble { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 13px; line-height: 1.6; }
    .msg.ai .bubble { background: #17171c; border: 1px solid rgba(255,255,255,0.08); }
    .msg.user .bubble { background: #8b7cf6; color: white; }
    footer { padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.08); display: flex; gap: 10px; }
    input[type=text] { flex: 1; background: #17171c; border: 1px solid rgba(255,255,255,0.12); border-radius: 10px; padding: 10px 14px; color: #eeeae4; font-size: 13px; outline: none; }
    input[type=text]:focus { border-color: #8b7cf6; }
    .send-btn { background: #8b7cf6; border: none; color: white; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-size: 14px; }
    .send-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>

  <!-- AUTH -->
  <div id="auth-screen">
    <div class="auth-box">
      <div class="auth-logo">Korale</div>
      <div class="auth-sub">Votre assistant IA personnel</div>
      <div class="auth-tabs">
        <div class="auth-tab active" onclick="switchTab('login')">Connexion</div>
        <div class="auth-tab" onclick="switchTab('register')">Inscription</div>
      </div>
      <div id="name-field" style="display:none">
        <input class="auth-input" type="text" id="auth-name" placeholder="Votre prénom" />
      </div>
      <input class="auth-input" type="email" id="auth-email" placeholder="Email" />
      <input class="auth-input" type="password" id="auth-password" placeholder="Mot de passe" />
      <button class="auth-btn" onclick="submitAuth()">Continuer</button>
      <div class="auth-error" id="auth-error"></div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-screen">
    <header>
      <div class="logo">Korale</div>
      <div class="user-info" id="user-label"></div>
      <button class="logout-btn" onclick="logout()">Déconnexion</button>
    </header>
    <div id="messages">
      <div class="msg ai">
        <div class="av ai">K</div>
        <div class="bubble">Bonjour ! Je suis Korale, votre assistant IA. Comment puis-je vous aider aujourd'hui ?</div>
      </div>
    </div>
    <footer>
      <input type="text" id="inp" placeholder="Écrivez votre message…" onkeydown="if(event.key==='Enter') send()" />
      <button class="send-btn" onclick="send()">Envoyer</button>
    </footer>
  </div>

  <script>
    let token = localStorage.getItem('korale_token');
    let user = JSON.parse(localStorage.getItem('korale_user') || 'null');
    let history = [];
    let conversationId = null;
    let authMode = 'login';

    if (token && user) showChat();

    function switchTab(mode) {
      authMode = mode;
      document.querySelectorAll('.auth-tab').forEach((t, i) => {
        t.classList.toggle('active', (mode === 'login' && i === 0) || (mode === 'register' && i === 1));
      });
      document.getElementById('name-field').style.display = mode === 'register' ? 'block' : 'none';
      document.getElementById('auth-error').textContent = '';
    }

    async function submitAuth() {
      const email = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      const name = document.getElementById('auth-name').value.trim();
      const endpoint = authMode === 'login' ? '/api/login' : '/api/register';
      const body = authMode === 'login' ? { email, password } : { email, password, name };

      const res = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('auth-error').textContent = data.error;
        return;
      }
      token = data.token;
      user = data.user;
      localStorage.setItem('korale_token', token);
      localStorage.setItem('korale_user', JSON.stringify(user));
      showChat();
    }

    async function showChat() {
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('chat-screen').style.display = 'flex';
      document.getElementById('user-label').textContent = user.name || user.email;
      const res = await fetch('/api/conversations', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' }
      });
      const data = await res.json();
      conversationId = data.id;
    }

    function logout() {
      localStorage.removeItem('korale_token');
      localStorage.removeItem('korale_user');
      location.reload();
    }

    async function send() {
      const inp = document.getElementById('inp');
      const text = inp.value.trim();
      if (!text) return;
      inp.value = '';
      addMsg('user', text);
      history.push({ role: 'user', content: text });
      const aiDiv = addMsg('ai', '...');
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ messages: history, conversationId })
      });
      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = '';
      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const lines = decoder.decode(value).split('\n');
        for (const line of lines) {
          if (line.startsWith('data: ') && line !== 'data: [DONE]') {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.text) { full += data.text; aiDiv.textContent = full; }
            } catch {}
          }
        }
      }
      history.push({ role: 'assistant', content: full });
      document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
    }

    function addMsg(role, text) {
      const msgs = document.getElementById('messages');
      const div = document.createElement('div');
      div.className = 'msg ' + role;
      div.innerHTML = `<div class="av ${role}">${role === 'ai' ? 'K' : 'V'}</div><div class="bubble">${text}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
      return div.querySelector('.bubble');
    }
  </script>
</body>
</html>
